apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
  name: postgres-order-vpa
  namespace: md
spec:
  targetRef:
    apiVersion: apps/v1
    kind: StatefulSet
    name: postgres-ord
  updatePolicy:
    updateMode: "Off"       # just recommend, don't touch
  resourcePolicy:
    containerPolicies:
    - containerName: postgres
      minAllowed:
        cpu: 100m
        memory: 128Mi
      maxAllowed:
        cpu: 1000m
        memory: 1Gi
      controlledResources:
      - cpu
      - memory