apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler 
metadata: 
  name: frontend-hpa
  namespace: md 
spec: 
  scaleTargetRef: 
    apiVersion: apps/v1 
    kind: Deployment 
    name: frontend 
  minReplicas: 1
  maxReplicas: 5 
  metrics: 
  - type: Resource 
    resource: 
      name: cpu 
      target: 
        type: Utilization 
        averageUtilization: 40 
  - type: Resource 
    resource: 
      name: memory 
      target:
        type: Utilization 
        averageUtilization: 70
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 30
      policies: 
      - type: Pods 
        value: 2
        periodSeconds: 30 
    scaleDown:
      stabilizationWindowSeconds: 120
      policies:
      - type: Pods 
        value: 1
        periodSeconds: 60 