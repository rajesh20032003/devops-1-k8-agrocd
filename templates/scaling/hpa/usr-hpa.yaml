apiVersion: autoscaling/v2 
kind: HorizontalPodAutoscaler 
metadata: 
  name: user-service-hpa
  namespace: md 
spec: 
  scaleTargetRef:
    apiVersion: apps/v1 
    kind: Deployment 
    name: user-service 
  minReplicas: 1
  maxReplicas: 5 
  metrics:
  - type: Resource 
    resource: 
      name: cpu 
      target: 
        type: Utilization
        averageUtilization: 50
  - type: Resource 
    resource: 
      name: memory 
      target: 
        type: Utilization
        averageUtilization: 50 
  behavior:
    scaleUp: 
      stabilizationWindowSeconds: 30
      policies: 
      - type: Pods 
        value: 2 
        periodSeconds: 45 
    scaleDown: 
      stabilizationWindowSeconds: 30 
      policies: 
      - type: Pods 
        value: 1
        periodSeconds: 45  

      