apiVersion: {{ .Values.deploymentversion }}
kind: {{ .Values.frontend.kind }}
metadata:
  name: {{ .Release.Name }}-{{ .Values.frontend.name }}
  namespace: {{.Release.Namespace }}
spec:
  replicas: {{.Values.frontend.replicas }}
  selector:
    matchLabels:
      app: {{ .Values.frontend.name }}
  template:
    metadata:
      labels:
        app: {{ .Values.frontend.name }}
    spec:
      # affinity:
      #   podAntiAffinity:
      #     requiredDuringSchedulingIgnoredDuringExecution:
      #     - labelSelector:
      #         matchLabels:
      #           app: {{ .Values.frontend.name }}
      #       topologyKey: {{.Values.topologyKey }} 
      imagePullSecrets:
      - name: {{.Values.harbor.SecretHarbor }}
      containers:
      - name: {{ .Values.frontend.name }}
        image: {{.Values.harbor.commonRepo}}/{{.Values.frontend.imgname}}:{{.Values.frontend.Tag}}
        ports:
        - containerPort: {{.Values.frontend.port}}
        volumeMounts:
        - name: {{.Values.frontend.configMap}}
          mountPath: /etc/nginx/conf.d/default.conf
          subPath: default.conf
        {{ with .Values.frontend.resources -}}
        resources:
        {{- toYaml . | nindent 10 }}
        {{- end }}
        livenessProbe:
          httpGet:
            path: {{ .Values.frontend.probes.liveness.path }}
            port: {{.Values.frontend.port }}
          initialDelaySeconds: {{.Values.frontend.probes.liveness.initialDelaySeconds}}
          periodSeconds: {{.Values.frontend.probes.liveness.periodSeconds}}
        readinessProbe:
          httpGet:
            path: {{ .Values.frontend.probes.readiness.path }}
            port: {{.Values.frontend.port }}
          initialDelaySeconds: {{.Values.frontend.probes.readiness.initialDelaySeconds}}
          periodSeconds: {{.Values.frontend.probes.readiness.periodSeconds}}
      volumes:
      - name: {{.Values.frontend.configMap}}
        configMap:
          name: {{.Values.frontend.configMap}}
