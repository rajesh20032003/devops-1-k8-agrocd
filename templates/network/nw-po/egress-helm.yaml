{{- range $key, $egress := .Values.egress | default dict }}
---
apiVersion: {{$egress.apiVersion}}
kind: {{$egress.kind}}
metadata: 
  name: {{$egress.name}}
  namespace: {{$.Release.Namespace}}
spec: 
  podSelector: 
    matchLabels:
      app: {{$egress.app}}
  policyTypes: 
  - {{ $egress.policytype }}
  egress:
  - to: 
    - podSelector: 
       matchLabels: 
         app: {{$egress.targetapp}}
    ports: 
     - port: {{$egress.port}}  
{{ end }}
   
