{{/*it contains services of user-service,order-service,frontend,gateway,pg-user-db,pg-ord-db*/}}
{{ range $key, $svc := .Values.services | default dict }}
---
apiVersion: {{$svc.apiVersion}}
kind: {{$svc.kind}}
metadata: 
 name: {{$svc.name}}
 namespace: {{$.Release.Namespace}}
 labels:
   monitored: {{$svc.monitoring | quote}}
spec: 
 type: {{$svc.type}}
 selector:
  app: {{$svc.app}}
 ports: 
  - name: {{$svc.portname}}
    port: {{$svc.port}}
    targetPort: {{$svc.targetport}}
{{- end -}}