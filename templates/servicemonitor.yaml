apiVersion: monitoring.coreos.com/v1 
kind: ServiceMonitor 
metadata:
  name: micro-dash-monitor
  namespace: monitoring
  labels: 
    release: prometheus
spec:
  namespaceSelector:
    matchNames:
    - {{.Release.Namespace}}
  selector:
    matchLabels:
      monitored: "true"
  endpoints:
  - port: http
    path: /metrics
    interval: 15s