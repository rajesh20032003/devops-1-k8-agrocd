apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: micro-dash-root-app
  namespace: argocd 
  finalizers: 
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default 
  source: 
    repoURL: https://github.com/rajesh20032003/devops-1-k8-agrocd.git
    targetRevision: HEAD
    path: apps 
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd 
  syncPolicy:
    automated:
      prune: true
      selfHeal: true 
    syncOptions:
      - createNamespace=true