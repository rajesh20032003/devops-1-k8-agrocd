apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: loki-stack
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  project: default
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
  sources:
    - repoURL: 'https://grafana.github.io/helm-charts'
      chart: loki-stack
      targetRevision: 2.10.2
      helm:
        valueFiles:
          - $values/values-monitoring.yaml
    - repoURL: 'https://github.com/rajesh20032003/devops-1-k8-agrocd.git'
      targetRevision: HEAD
      ref: values 