apiVersion: apps/v1 
kind: Deployment 
metadata: 
 name: gateway
 namespace: md
spec: 
 replicas: 1
 selector: 
  matchLabels: 
   app: gateway 
 template:
  metadata:
   labels:
    app: gateway
  spec: 
   affinity:
      podAntiAffinity:
        requiredDuringSchedulingIgnoredDuringExecution:
        - labelSelector:
           matchLabels:
             app: gateway
          topologyKey: kubernetes.io/hostname 
   imagePullSecrets:
     - name: harbor-cred 
   containers: 
    - name: gateway 
      image: 34.133.110.141/micro-dash/gateway:ci-1
      ports: 
       - containerPort: 3000
      env:
        - name: PORT
          value: "3000"
        - name: USER_SERVICE_URL
          value: "http://user-service-svc.md.svc.cluster.local:3001"
        - name: ORDER_SERVICE_URL
          value: "http://order-service-svc.md.svc.cluster.local:3002"
      resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "200m"
 