apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata: 
  name: gatway-to-userservice
  namespace: md
spec:
  podSelector:
    matchLabels: 
     app: user-service
  policyTypes:
  - Ingress 
  ingress: 
  - from: 
    - podSelector: 
        matchLabels:
          app: gateway 
    ports: 
     - port: 3001
      