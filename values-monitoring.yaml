grafana:
  adminPassword: admin123
  sidecar:
    datasources:
      defaultDatasourceEnabled: false
  additionalDataSources:
    - name: Prometheus
      type: prometheus
      url: http://prometheus-kube-prometheus-prometheus:9090
      access: proxy
      isDefault: false
alertmanager:
  config:
    global:
      smtp_smarthost: 'smtp.gmail.com:587'
      smtp_from: 'rajesh777@gmail.com'
      smtp_auth_username: 'rajesh777@gmail.com'
      smtp_auth_password: 'xxxx xxxx xxxx xxxx'
    route:
      receiver: 'email'
      group_by: ['alertname']
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 4h
    receivers:
      - name: 'null'
      - name: 'email'
        email_configs:
          - to: 'rajeshgovindan777@gmail.com'
            send_resolved: true
    inhibit_rules:
      - source_matchers:
          - 'severity = critical'
        target_matchers:
          - 'severity = warning'