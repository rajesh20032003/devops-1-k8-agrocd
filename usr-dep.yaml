apiVersion: apps/v1
kind: Deployment 
metadata: 
 name: user-service
 namespace: md 
spec: 
  replicas: 1
  selector:
   matchLabels:
    app: user-service
  template:
   metadata:
    labels:
      app: user-service
   spec:
    imagePullSecrets:
      - name: harbor-cred
    containers:
      - name: user-service
        # imagePullPolicy: IfNotPresent
        image: 34.133.110.141/micro-dash/user-service:ci-1
        ports:
        - containerPort: 3001
        env:
        - name: PORT 
          value: "3001"
        - name: DB_HOST
          value: "postgres-service.md.svc.cluster.local"
        - name: DB_PORT
          value: "5432"
        - name: DB_USER
          valueFrom:
           secretKeyRef: 
             name: db-secret
             key: POSTGRES_USER
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: db-secret
              key: POSTGRES_PASSWORD
        - name: DB_NAME
          value: "usersdb"
        startupProbe:
          httpGet:
            path: /health
            port: 3001
          initialDelaySeconds: 10 
          periodSeconds: 5
          failureThreshold: 2
        livenessProbe: 
          httpGet: 
           path: /health
           port: 3001
          initialDelaySeconds: 10
          periodSeconds: 5
          failureThreshold: 2
        readinessProbe:
         httpGet: 
          path: /health 
          port: 3001 
         initialDelaySeconds: 10
         periodSeconds: 5
         failureThreshold: 2
         
        resources:
          requests:
           memory: "128Mi"
           cpu: "100m"
          limits:
           memory: "256Mi"
           cpu: "200m"